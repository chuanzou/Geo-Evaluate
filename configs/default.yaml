seed: 42
device: auto

data:
  root: data/processed/synthetic_cloud_benchmark
  image_size: 128
  bands: [red, green, blue, nir]
  cloud_coverages: [0.05, 0.10, 0.30, 0.50, 0.70]
  train_fraction: 0.7
  val_fraction: 0.1
  temporal_neighbors: 3

training:
  batch_size: 8
  epochs: 5
  learning_rate: 0.0002
  num_workers: 0
  lambda_l1: 100.0
  diffusion_timesteps: 100

outputs:
  checkpoint_dir: outputs/checkpoints
  metrics_dir: outputs/metrics
  figure_dir: outputs/figures
