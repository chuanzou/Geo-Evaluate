seed: 42
device: mps

data:
  root: data/processed/synthetic_cloud_benchmark
  image_size: 128
  bands: [red, green, blue, nir]
  cloud_coverages: [0.05, 0.10, 0.30, 0.50, 0.70]
  train_fraction: 0.7
  val_fraction: 0.1
  temporal_neighbors: 3

training:
  batch_size: 4
  epochs: 8                 # GAN 专用；diffusion 用下面的 diffusion_epochs
  diffusion_epochs: 50      # diffusion 要更多 epoch（每步只学一个随机 timestep 的去噪）
  learning_rate: 0.00005
  num_workers: 0
  lambda_l1: 100.0
  diffusion_timesteps: 100

outputs:
  checkpoint_dir: outputs/checkpoints
  metrics_dir: outputs/metrics
  figure_dir: outputs/figures
